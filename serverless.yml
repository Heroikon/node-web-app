service: moja-aplikacja-serverless

provider:
  name: aws
  runtime: nodejs20.x
  stage: dev
  region: eu-central-1

# --- TA SEKCJA USUWA KONIECZNOŚĆ WPISYWANIA /dev ---
custom:
  serverless-offline:
    noPrependStageInUrl: true
# --------------------------------------------------

functions:
  app:
    handler: server.handler
    events:
      - http:
          path: /
          method: ANY
      - http:
          path: /{proxy+}
          method: ANY

plugins:
  - serverless-offline